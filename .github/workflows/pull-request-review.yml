# Workflow that reviews changes in pull requests and writes the feedback in review comments.
name: Pull request review

on:
  # We use pull_request_target such that we can grant permissions.
  # This means that the job specification is being pulled from master, instead of from the feature branche.
  pull_request_target:
    branches: [ master ]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Gate the whole job behind a manual approval. Because this is a
    # pull_request_target workflow that checks out and runs against untrusted
    # fork code (see allow-unsafe-pr-checkout below), a maintainer must approve
    # each run via the "fork-pr-review" environment's required reviewers.
    # Approval is requested again on every new push to the PR.
    # NOTE: an org admin must configure Settings > Environments > fork-pr-review
    # with required reviewers, otherwise the environment is auto-created with no
    # protection and the gate does nothing.
    environment: fork-pr-review
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout pull request base
        uses: actions/checkout@v7
        with:
          path: ./base
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Checkout pull request head
        uses: actions/checkout@v7
        with:
          path: ./head
          ref: ${{ github.event.pull_request.head.sha }}
          # actions/checkout@v7 refuses to check out fork PR code in a
          # pull_request_target workflow unless explicitly opted in. The job is
          # gated behind the fork-pr-review environment (above), so a maintainer
          # reviews the fork's code before this runs.
          allow-unsafe-pr-checkout: true

      - name: Initialize ~/.local/bin directory
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download yivi CLI tool
        run: wget -O "$HOME/.local/bin/yivi" https://github.com/privacybydesign/irmago/releases/latest/download/yivi-linux-amd64

      - name: Set executable permissions
        run: chmod +x "$HOME/.local/bin/yivi"

      - name: Verify scheme at base
        run: yivi irma scheme verify > ../output-base.txt
        shell: bash
        working-directory: ./base

      - name: Verify scheme at head
        run: yivi irma scheme verify > ../output-head.txt 2>&1
        shell: bash
        working-directory: ./head
        continue-on-error: true

      - name: Initialize message
        run: echo "The following issues were found when running \`yivi irma scheme verify\`:" > ./message.txt
        shell: bash

      - name: Generate diff
        id: generate-diff
        run: grep -xvF -f ./output-base.txt ./output-head.txt >> ./message.txt
        shell: bash
        continue-on-error: true

      - name: Write review comment if warnings were found
        if: steps.generate-diff.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} -F ../message.txt
        working-directory: ./base

      - name: Write review comment if no issues were found
        if: steps.generate-diff.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} -b "No issues were found when running \`yivi irma scheme verify\`."
        working-directory: ./base
